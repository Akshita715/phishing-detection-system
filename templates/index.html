<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Phishing Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🛡️ Phishing Detection System</h1>

<form method="POST">

<input
type="text"
name="user_input"
placeholder="Enter URL or Email Text"
required>

<button type="submit">

Analyze

</button>

</form>

{% if result %}

<div class="result">

<h2>{{ result.status }}</h2>

<p><strong>Risk Score :</strong> {{ result.score }}</p>

<h3>Reasons</h3>

<ul>

{% for reason in result.reasons %}

<li>{{ reason }}</li>

{% endfor %}

</ul>

</div>

{% endif %}

</div>

</body>

</html>
